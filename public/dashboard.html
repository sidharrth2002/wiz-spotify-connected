<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiz Audio Sync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      font-family: 'Space Grotesk', 'Manrope', 'Helvetica Neue', sans-serif;
      color-scheme: dark;
      --bg: #070c16;
      --panel: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.12);
      --glow: #7cf0ff;
      --accent: linear-gradient(120deg, #7cf0ff, #7dfd9b, #c7ff60);
      --text: #e9f0ff;
      --muted: #8fa1c3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: radial-gradient(1200px at 10% 10%, rgba(124, 240, 255, 0.08), transparent),
                  radial-gradient(900px at 90% 20%, rgba(199, 255, 96, 0.06), transparent),
                  linear-gradient(145deg, #050910, #0b1527 55%, #050910);
      padding: 32px;
    }

    .canvas::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(600px at 80% 80%, rgba(124, 240, 255, 0.06), transparent),
                  radial-gradient(700px at 20% 70%, rgba(125, 253, 155, 0.08), transparent);
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
    }

    .canvas {
      position: relative;
      max-width: 1100px;
      margin: 0 auto;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-end;
    }

    h1 { margin: 0; font-size: 32px; letter-spacing: -0.01em; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 13px;
      color: var(--muted);
    }

    .eyebrow .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #7cf0ff;
      box-shadow: 0 0 0 8px rgba(124, 240, 255, 0.12);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 6px rgba(124, 240, 255, 0.14); }
      50% { box-shadow: 0 0 0 14px rgba(124, 240, 255, 0.04); }
      100% { box-shadow: 0 0 0 6px rgba(124, 240, 255, 0.14); }
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(10px);
    }

    .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }

    label { font-size: 14px; color: var(--muted); display: flex; flex-direction: column; gap: 6px; }

    select, input[type="number"] {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      min-width: 100px;
      outline: none;
      transition: border 0.2s ease, transform 0.15s ease;
    }

    select:focus, input[type="number"]:focus { border-color: #7cf0ff; transform: translateY(-1px); }

    button {
      cursor: pointer;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
      background-image: var(--accent);
      color: #04101a;
      box-shadow: 0 12px 40px rgba(124, 240, 255, 0.35);
      transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    button:hover { transform: translateY(-1px); filter: saturate(1.1); box-shadow: 0 18px 40px rgba(124, 240, 255, 0.4); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }

    .secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .chips { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }

    .chip {
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 999px;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(6px);
      color: var(--text);
    }

    .status {
      font-family: 'Manrope', 'Space Grotesk', monospace;
      font-size: 13px;
      white-space: pre-wrap;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 12px;
      min-height: 48px;
      border: 1px solid var(--border);
      color: var(--muted);
      flex: 1;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }

    .hint { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="canvas">
    <header>
      <div>
        <div class="eyebrow"><span class="dot"></span>Live audio -> Wiz</div>
        <h1>Wiz Audio Sync</h1>
        <div class="hint">Pick rooms, tune the vibe, and launch the Mac audio tap.</div>
      </div>
      <div class="pill" id="roomCount">Rooms: 0</div>
    </header>

    <div class="card">
      <div class="row" style="justify-content: space-between; align-items: center;">
        <strong>Rooms</strong>
        <button class="secondary" id="refreshRooms">Refresh rooms</button>
      </div>
      <div id="rooms" class="chips" aria-live="polite"></div>
      <div class="hint">In surround mode: first selected room is treated as LEFT, the rest as RIGHT.</div>
    </div>

    <div class="card controls">
      <label>
        Mode
        <select id="mode">
          <option value="auto">auto</option>
          <option value="calm">calm</option>
          <option value="party">party</option>
          <option value="surround">surround</option>
        </select>
      </label>
      <label>
        Sensitivity
        <input id="sensitivity" type="number" step="0.05" min="0.8" max="2.5" value="1.1" />
      </label>
      <div class="pill">Tip: start around 1.1, raise to make it snappier.</div>
    </div>

    <div class="card row" style="gap: 12px; align-items: center;">
      <button id="start">Start system audio sync</button>
      <button id="abort" class="secondary">Abort</button>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const roomsEl = document.getElementById('rooms');
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('start');
    const abortBtn = document.getElementById('abort');
    const refreshBtn = document.getElementById('refreshRooms');
    const modeEl = document.getElementById('mode');
    const sensEl = document.getElementById('sensitivity');
    const roomCount = document.getElementById('roomCount');

    const setStatus = (msg) => statusEl.textContent = msg;

    async function loadRooms() {
      setStatus('Loading rooms…');
      try {
        const res = await fetch('/rooms');
        const data = await res.json();
        renderRooms(data);
        setStatus('Rooms loaded');
      } catch (err) {
        setStatus('Failed to load rooms: ' + err.message);
      }
    }

    function renderRooms(data) {
      roomsEl.innerHTML = '';
      const ids = Object.keys(data || {});
      roomCount.textContent = 'Rooms: ' + ids.length;
      if (ids.length === 0) {
        roomsEl.textContent = 'No rooms discovered yet. Ensure bulbs are on and try Refresh.';
        return;
      }
      ids.forEach((id) => {
        const chip = document.createElement('label');
        chip.className = 'chip';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = id;
        cb.checked = true;
        const span = document.createElement('span');
        span.textContent = id + ' (' + (data[id]?.length || 0) + ' bulbs)';
        chip.appendChild(cb);
        chip.appendChild(span);
        roomsEl.appendChild(chip);
      });
    }

    function selectedRoomIds() {
      const checked = [...roomsEl.querySelectorAll('input[type="checkbox"]:checked')].map((el) => el.value);
      return checked;
    }

    async function startSession() {
      const rooms = selectedRoomIds();
      if (rooms.length === 0) {
        setStatus('Select at least one room.');
        return;
      }
      const mode = modeEl.value;
      const sensitivity = sensEl.value || '1.1';
      const params = new URLSearchParams({ roomIds: rooms.join(','), mode, sensitivity });
      setStatus('Starting…');
      startBtn.disabled = true;
      try {
        const res = await fetch('/dance-to-system-audio?' + params.toString());
        const text = await res.text();
        setStatus(text);
      } catch (err) {
        setStatus('Failed to start: ' + err.message);
      } finally {
        startBtn.disabled = false;
      }
    }

    async function abortSession() {
      setStatus('Aborting…');
      try {
        const res = await fetch('/dance-to-system-audio/abort');
        const text = await res.text();
        setStatus(text);
      } catch (err) {
        setStatus('Failed to abort: ' + err.message);
      }
    }

    startBtn.addEventListener('click', startSession);
    abortBtn.addEventListener('click', abortSession);
    refreshBtn.addEventListener('click', loadRooms);

    loadRooms();
  </script>
</body>
</html>
